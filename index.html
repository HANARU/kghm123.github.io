  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      transition: background 0.4s, color 0.4s;
    }

    :root {
      --bg: #f7f4ee;
      --bg2: #efeae0;
      --fg: #1c1a16;
      --fg2: #6b6455;
      --accent: #c8a97e;
      --accent2: #b8936a;
      --border: rgba(28, 26, 22, 0.1);
      --sidebar-w: 260px;
      --mono: 'Space Mono', monospace;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 2px;
    }

    /* LAYOUT */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      padding: 48px 36px;
      border-right: 1px solid var(--border);
      z-index: 100;
      background: var(--bg);
      transition: background 0.4s;
    }

    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
    }

    /* SIDEBAR CONTENT */
    .sidebar-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fg);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .sidebar-role {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.05em;
      margin-bottom: 48px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg2);
      border: none;
      background: none;
      text-align: left;
      transition: color 0.2s;
      position: relative;
    }

    .nav-item::before {
      content: '';
      width: 20px;
      height: 1px;
      background: var(--fg2);
      transition: width 0.3s, background 0.2s;
    }

    .nav-item:hover,
    .nav-item.active {
      color: var(--fg);
    }

    .nav-item:hover::before,
    .nav-item.active::before {
      width: 32px;
      background: var(--accent);
    }

    .nav-item.active {
      color: var(--fg);
      font-weight: 600;
    }

    .sidebar-footer {
      margin-top: auto;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg2);
      opacity: 0.5;
      line-height: 1.8;
    }

    /* SECTIONS */
    section {
      min-height: 100vh;
      padding: 80px 72px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    section:last-child {
      border-bottom: none;
    }

    /* HERO SECTION */
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 120px;
    }

    .hero-eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.6s 0.1s, transform 0.6s 0.1s;
    }

    .hero-name {
      font-size: clamp(56px, 7vw, 100px);
      font-weight: 700;
      line-height: 0.92;
      letter-spacing: -0.03em;
      color: var(--fg);
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s 0.2s, transform 0.7s 0.2s;
    }

    .hero-name span {
      color: var(--accent);
    }

    .hero-tagline {
      font-size: 16px;
      color: var(--fg2);
      max-width: 380px;
      line-height: 1.7;
      font-weight: 400;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.6s 0.4s, transform 0.6s 0.4s;
    }

    .hero-divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 28px 0;
      opacity: 0;
      transition: opacity 0.6s 0.35s, width 0.8s 0.5s;
    }

    .hero.visible .hero-eyebrow,
    .hero.visible .hero-name,
    .hero.visible .hero-tagline,
    .hero.visible .hero-divider {
      opacity: 1;
      transform: translateY(0);
    }

    .hero.visible .hero-divider {
      width: 40px;
      opacity: 1;
    }

    /* SECTION HEADER */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 56px;
    }

    .section-num {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .section-title {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--fg);
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      max-width: 120px;
    }

    /* ABOUT */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .about-text p {
      font-size: 15px;
      line-height: 1.85;
      color: var(--fg2);
      margin-bottom: 20px;
    }

    .about-text p strong {
      color: var(--fg);
      font-weight: 600;
    }

    .about-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 28px;
      border-radius: 2px;
    }

    .about-card-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .about-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .about-info-row:last-child {
      border-bottom: none;
    }

    .about-info-key {
      color: var(--fg2);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .about-info-val {
      color: var(--fg);
      font-weight: 600;
      font-family: var(--mono);
      font-size: 11px;
    }

    /* SKILLS */
    .skills-categories {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .skill-cat-title {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .skill-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .skill-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .skill-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--fg);
      width: 140px;
      flex-shrink: 0;
    }

    .skill-bar-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .skill-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .skill-bar-fill.animated {}

    .skill-level {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--fg2);
      width: 36px;
      text-align: right;
    }

    .skills-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .skill-tag {
      padding: 8px 16px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-family: var(--mono);
      color: var(--fg2);
      border-radius: 1px;
      cursor: default;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .skill-tag:hover {
      border-color: var(--accent);
      color: var(--fg);
      background: rgba(200, 169, 126, 0.08);
    }

    /* BLOG GRID */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .blog-card {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      background: var(--bg2);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .blog-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(28, 26, 22, 0.08);
    }

    .blog-card:hover .blog-card-arrow {
      opacity: 1;
      transform: translate(2px, -2px);
    }

    .blog-card:hover .blog-thumb-overlay {
      opacity: 1;
    }

    /* Thumbnail */
    .blog-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      position: relative;
      overflow: hidden;
      background: var(--bg2);
      flex-shrink: 0;
    }

    .blog-thumb svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .blog-thumb-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg2);
      opacity: 0.5;
      letter-spacing: 0.08em;
      pointer-events: none;
    }

    .blog-thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(200, 169, 126, 0.12);
      opacity: 0;
      transition: opacity 0.25s;
    }

    /* Card body */
    .blog-card-body {
      padding: 20px 20px 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .blog-card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .blog-card-tag {
      font-family: var(--mono);
      font-size: 9px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      color: var(--accent);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .blog-card-date {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg2);
      letter-spacing: 0.06em;
    }

    .blog-card-views {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg2);
      margin-left: auto;
      letter-spacing: 0.04em;
      opacity: 0.6;
    }

    .blog-card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--fg);
      line-height: 1.45;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
      flex: 1;
    }

    .blog-card-excerpt {
      font-size: 12px;
      color: var(--fg2);
      line-height: 1.6;
      opacity: 0.8;
      margin-bottom: 14px;
    }

    .blog-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .blog-card-read {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg2);
      opacity: 0.6;
      letter-spacing: 0.06em;
    }

    .blog-card-arrow {
      font-size: 14px;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
    }

    /* Mobile: blog single column */
    @media (max-width: 768px) {
      .blog-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .blog-card-title {
        font-size: 14px;
      }

      .blog-card-excerpt {
        display: none;
      }
    }

    /* BLOG ACTIONS */
    .blog-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 12px;
    }

    .blog-more-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: 1px solid var(--border);
      background: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--fg2);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      border-radius: 1px;
    }

    .blog-more-btn:hover {
      border-color: var(--accent);
      color: var(--fg);
      background: rgba(200, 169, 126, 0.06);
    }

    .blog-more-icon {
      font-size: 11px;
      color: var(--accent);
      transition: transform 0.2s;
    }

    .blog-all-link {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: opacity 0.2s;
      margin-left: auto;
    }

    .blog-all-link:hover {
      opacity: 0.7;
    }

    /* CONTACT */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: start;
    }

    .contact-intro {
      font-size: 32px;
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    .contact-sub {
      font-size: 14px;
      color: var(--fg2);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--fg2);
      text-decoration: none;
      transition: color 0.2s;
      padding: 4px 0;
    }

    .contact-link:hover {
      color: var(--accent);
    }

    .contact-link-icon {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 10px;
      transition: border-color 0.2s, background 0.2s;
    }

    .contact-link:hover .contact-link-icon {
      border-color: var(--accent);
      background: rgba(200, 169, 126, 0.08);
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .form-input,
    .form-textarea {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 12px 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      color: var(--fg);
      outline: none;
      border-radius: 1px;
      transition: border-color 0.2s;
      resize: none;
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--accent);
    }

    .form-textarea {
      min-height: 100px;
    }

    .form-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 24px;
      background: var(--fg);
      color: var(--bg);
      border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      border-radius: 1px;
    }

    .form-btn:hover {
      background: var(--accent);
      transform: translateY(-1px);
    }

    .form-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .form-input-error {
      border-color: #c0553a !important;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .tweak-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      background: var(--bg2);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg);
      outline: none;
      border-radius: 1px;
      transition: border-color 0.2s;
    }

    .tweak-input:focus {
      border-color: var(--accent);
    }

    .tweak-input::placeholder {
      color: var(--fg2);
      opacity: 0.5;
    }

    /* LANG SWITCHER */
    .lang-switcher {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .lang-btn {
      background: none;
      border: none;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg2);
      cursor: pointer;
      padding: 3px 2px;
      letter-spacing: 0.06em;
      transition: color 0.2s;
      opacity: 0.6;
    }

    .lang-btn:hover {
      color: var(--fg);
      opacity: 1;
    }

    .lang-btn.active {
      color: var(--accent);
      opacity: 1;
      font-weight: 700;
    }

    .lang-sep {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--fg2);
      opacity: 0.3;
    }

    /* DARK MODE TOGGLE */
    .dark-toggle {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg2);
      cursor: pointer;
      position: relative;
      transition: background 0.3s, border-color 0.3s;
      flex-shrink: 0;
    }

    .dark-toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--fg2);
      transition: transform 0.3s, background 0.3s;
    }

    .dark-toggle.on {
      background: var(--accent);
      border-color: var(--accent);
    }

    .dark-toggle.on::after {
      transform: translateX(16px);
      background: var(--bg);
    }

    .sidebar-bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .dark-toggle-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg2);
      letter-spacing: 0.06em;
      opacity: 0.6;
    }

    /* ANIMATE ON SCROLL */
    .anim {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .anim.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .anim-delay-1 {
      transition-delay: 0.1s;
    }

    .anim-delay-2 {
      transition-delay: 0.2s;
    }

    .anim-delay-3 {
      transition-delay: 0.3s;

    .tweaks-options {
      display: flex;
      flex-direction: column;
      gap: 6px;

      background: none;
      font-family: 'Space Grotesk', sans-serif;

      text-align: left;

      justify-content: space-between;
      padding: 0 20px;

    }

    .mobile-header-name {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg);
    }

    .mobile-header-name span {
      color: var(--accent);
    }

    .hamburger {
      width: 44px;
      height: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--fg);
      transition: transform 0.3s, opacity 0.3s, width 0.3s;
      transform-origin: center;
    }

    .hamburger.open span:nth-child(1) {
      transform: translateY(6.5px) rotate(45deg);
    }

    .hamburger.open span:nth-child(2) {
      opacity: 0;
      width: 0;
    }

    .hamburger.open span:nth-child(3) {
      transform: translateY(-6.5px) rotate(-45deg);
    }

    .mobile-drawer {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 190;
      pointer-events: none;
    }

    .mobile-drawer.open {
      pointer-events: all;
    }

    .drawer-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(28, 26, 22, 0.35);
      opacity: 0;
      transition: opacity 0.3s;
      backdrop-filter: blur(2px);
    }

    .mobile-drawer.open .drawer-backdrop {
      opacity: 1;
    }

    .drawer-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: min(280px, 80vw);
      height: 100%;
      background: var(--bg);
      border-left: 1px solid var(--border);
      padding: 72px 32px 40px;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);

    .mobile-drawer.open .drawer-panel {

    .drawer-nav {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .drawer-nav-item {

      align-items: center;
      gap: 14px;

      color: var(--fg2);

      letter-spacing: -0.01em;
      transition: color 0.2s;

    .drawer-nav-item:last-child {

    function useIntersection(ref, options = {}) {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            setVisible(true);
            obs.disconnect();
          }
        }, { threshold: 0.15, ...options });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return visible;
    }

    function AnimDiv({ children, className = '', delay = 0, tag: Tag = 'div', style = {} }) {
      const ref = useRef();
      const visible = useIntersection(ref);
      return (
        <Tag
          ref={ref}
          className={`anim${visible ? ' visible' : ''}${className ? ' ' + className : ''}`}
          style={{ transitionDelay: delay + 's', ...style }}
        >
          {children}
        </Tag>
      );
    }

    function ContactSection({ endpoint }) {
      const t = useLang();
      const [status, setStatus] = useState('idle');
      const [fields, setFields] = useState({ name: '', email: '', message: '' });
      const [errors, setErrors] = useState({});

      const validate = () => {
        const e = {};
        if (!fields.name.trim()) e.name = t.errs[0];
        if (!fields.email.trim()) e.email = t.errs[1];
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(fields.email)) e.email = t.errs[2];
        if (!fields.message.trim()) e.message = t.errs[3];
        return e;
      };

      const handleChange = (k, v) => {
        setFields(f => ({ ...f, [k]: v }));
        if (errors[k]) setErrors(e => ({ ...e, [k]: null }));
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        const errs = validate();
        if (Object.keys(errs).length) { setErrors(errs); return; }
        if (!endpoint) { setStatus('no-endpoint'); return; }
        setStatus('loading');
        try {
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ name: fields.name, email: fields.email, message: fields.message }),
          });
          if (res.ok) { setStatus('success'); }
          else { setStatus('error'); }
        } catch { setStatus('error'); }
      };

      const fieldKeys = ['name', 'email', 'message'];

      return (
        <section id="contact-section" data-screen-label="05 Contact">
          <SectionHeader num="05" title={t.secTitles[4]} />

            <AnimDiv>

                {[
                  { icon: "GH", label: "github.com/HANARU", href: "https://github.com/HANARU" },
                  { icon: "ML", label: "kghm1231@gmail.com", href: "mailto:kghm1231@gmail.com" },
                  { icon: "LI", label: "linkedin.com/in/kghm123", href: "https://linkedin.com/in/kghm123" },
                ].map(l => (
                  <a className="contact-link" href={l.href} key={l.icon} target="_blank" rel="noopener noreferrer">
                    <div className="contact-link-icon">{l.icon}</div>
                    <span>{l.label}</span>
                  </a>
                ))}
              </div>
            </AnimDiv>
            <AnimDiv delay={0.15}>
              {status === 'success' ? (
                <div style={{ padding: '48px 0' }}>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--accent)', marginBottom: 14, letterSpacing: '0.1em' }}>{t.successCode}</div>
                  <div style={{ fontSize: 20, fontWeight: 600, marginBottom: 8 }}>{t.successTitle}</div>
                  <div style={{ fontSize: 13, color: 'var(--fg2)', lineHeight: 1.6 }}>{t.successSub}</div>
                  <button className="form-btn" style={{ marginTop: 28, width: 'fit-content' }}
                    onClick={() => { setStatus('idle'); setFields({ name: '', email: '', message: '' }); }}>
                    {t.resend}
                  </button>
                </div>
              ) : status === 'no-endpoint' ? (
                <div style={{ padding: '32px', background: 'var(--bg2)', border: '1px solid var(--border)' }}>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--accent)', marginBottom: 12, letterSpacing: '0.1em' }}>{t.setupCode}</div>
                  <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>{t.setupTitle}</div>
                  <ol style={{ fontSize: 12, color: 'var(--fg2)', lineHeight: 2, paddingLeft: 18 }}>
                    {t.setupSteps.map((s, i) => <li key={i}>{s}</li>)}
                  </ol>
                  <button className="form-btn" style={{ marginTop: 20, width: 'fit-content', fontSize: 11 }} onClick={() => setStatus('idle')}>
                    {t.setupBack}
                  </button>
                </div>
              ) : (
                <form className="contact-form" onSubmit={handleSubmit} noValidate>
                  {fieldKeys.map((k, i) => (
                    <div className="form-field" key={k}>
                      <label className="form-label">{t.formLabels[i]}</label>
                      {k === 'message' ? (
                        <textarea className={`form-textarea${errors[k] ? ' form-input-error' : ''}`}
                          placeholder={t.formPH[2]} value={fields[k]}
                          onChange={e => handleChange(k, e.target.value)} />
                      ) : (
                        <input className={`form-input${errors[k] ? ' form-input-error' : ''}`}
                          type={k === 'email' ? 'email' : 'text'}
                          placeholder={t.formPH[i]} value={fields[k]}
                          onChange={e => handleChange(k, e.target.value)} />
                      )}
                      {errors[k] && <span style={{ fontFamily: 'var(--mono)', fontSize: 10, color: '#c0553a', marginTop: 2 }}>{errors[k]}</span>}

                  ))}
                  {status === 'error' && <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: '#c0553a', padding: '8px 0' }}>{t.sendError}</div>}
                  <button className="form-btn" type="submit" disabled={status === 'loading'}>
                    {status === 'loading'
                      ? <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}><span className="spinner" />{t.formSending}</span>
                      : t.formSubmit}
                  </button>
                </form>
              )}
            </AnimDiv>
          </div>
        </section>
      );

      return (
        <div className={`mobile-drawer${open ? ' open' : ''}`}>
          <div className="drawer-backdrop" onClick={() => setOpen(false)} />
          <div className="drawer-panel">
            <nav className="drawer-nav">
              {currentRoute === '/' ? navIds.map((id, i) => (
                <button key={id}
                  className={`drawer-nav-item${activeSection === id ? ' active' : ''}`}
                  onClick={() => handleNav(id)}
                >{t.navItems[i]}</button>
              )) : (
                <button className="drawer-nav-item active" onClick={() => { window.location.hash = '/'; setOpen(false); }}>
                  ← Home
                </button>
              )}
            </nav>
            <div className="drawer-footer">{t.footer}</div>
          </div>
        </div>
      );
    }

    function TweaksPanel({ open, theme, setTheme, endpoint, setEndpoint, t }) {
      const themeIds = ['warm', 'debug', 'dark'];
      return (
        <div className={`tweaks-panel${open ? ' open' : ''}`}>
          <div className="tweaks-title">// Tweaks</div>
          <div className="tweaks-group">
            <div className="tweaks-group-label">{t.tweaksThemeLabel}</div>
            <div className="tweaks-options">
              {themeIds.map((id, i) => (
                <button key={id}
                  className={`tweak-btn${theme === id ? ' selected' : ''}`}
                  onClick={() => setTheme(id)}
                >{t.tweaksThemeOpts[i]}</button>
              ))}
            </div>
          </div>
          <div className="tweaks-group">
            <div className="tweaks-group-label">{t.tweaksFormspreeLabel}</div>
            <input className="tweak-input"
              placeholder="https://formspree.io/f/xxxxxxxx"
              value={endpoint}
              onChange={e => setEndpoint(e.target.value)}
              onBlur={e => {
                window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { formspreeEndpoint: e.target.value } }, '*');
                TWEAK_DEFAULTS.formspreeEndpoint = e.target.value;
              }}
            />
            <div style={{ fontSize: 9, fontFamily: 'var(--mono)', color: 'var(--fg2)', marginTop: 6, opacity: 0.7, lineHeight: 1.6 }}>
              formspree.io에서 무료 가입 후<br />엔드포인트 URL을 붙여넣으세요.
            </div>
          </div>
        </div>
      );
    }

    function PortfolioView({ selectedProject }) {
      const lang = useContext(LangContext);
      const [mdHtml, setMdHtml] = useState('');
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        window.scrollTo(0, 0);

        if (!selectedProject) return;

        setLoading(true);
        // fetch markdown dynamically based on id and lang
        fetch(`projects/${selectedProject.id}-${lang}.md`)
          .then(res => {
            if (!res.ok) throw new Error('Not found');
            return res.text();
          })
          .then(text => {
            setMdHtml(marked.parse(text));
            setLoading(false);
          })
          .catch(err => {
            setMdHtml('<p>Content not found.</p>');
            setLoading(false);
          });

      }, [selectedProject, lang]);

      if (!selectedProject) {
        return (
          <div style={{ padding: '100px 0', textAlign: 'center' }}>
            Page not found. <a href="#/" style={{ color: 'var(--accent)' }}>Go back</a>
          </div>
        );
      }

      return (
        <section className="portfolio-detail-view" style={{ minHeight: '100vh', paddingTop: '40px' }}>
          <button className="form-btn" onClick={() => window.location.hash = '/'} style={{ marginBottom: 40, width: 'fit-content' }}>
            ← Back
          </button>
          <SectionHeader num="PF" title="Portfolio Detail" />
          <AnimDiv>
            <div style={{ fontSize: 32, fontWeight: 700, marginBottom: 12, color: selectedProject.color }}>{selectedProject.title[lang]}</div>
            <div style={{ color: 'var(--fg2)', fontSize: 14, marginBottom: 32, display: 'flex', gap: 16 }}>
              <span>{selectedProject.role}</span>
              <span>|</span>
              <span>{selectedProject.period}</span>
            </div>

            {loading ? (
              <p style={{ color: 'var(--fg2)', lineHeight: 1.8, marginBottom: 40, fontSize: 16 }}>Loading...</p>
            ) : (
              <div
                className="markdown-body"
                style={{ color: 'var(--fg)', lineHeight: 1.8, marginBottom: 40, fontSize: 16 }}
                dangerouslySetInnerHTML={{ __html: mdHtml }}
              />
            )}

            <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginBottom: 48 }}>
              {selectedProject.techStack.map(ts => (
                <span className="skill-tag" key={ts} style={{ background: selectedProject.color + '20', color: selectedProject.color, border: 'none', padding: '8px 16px', borderRadius: 20 }}>{ts}</span>
              ))}
            </div>

            <div style={{ width: '100%', height: 500, background: selectedProject.color + '20', border: `1px dashed ${selectedProject.color}`, borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', color: selectedProject.color, marginBottom: 40 }}>
              [Image / Video Placeholder]
            </div>
          </AnimDiv>
        </section>
      );
    }

    function App() {
      const savedLang = localStorage.getItem('portfolio-lang') || 'ko';
      const [lang, setLang] = useState(savedLang);
      const [activeSection, setActiveSection] = useState('about-section');
      const [tweaksOpen, setTweaksOpen] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);
      const [theme, setTheme] = useState(TWEAK_DEFAULTS.theme || 'warm');
      const [endpoint, setEndpoint] = useState(TWEAK_DEFAULTS.formspreeEndpoint || '');
      const [currentRoute, setCurrentRoute] = useState(() => window.location.hash.slice(1) || '/');
      const [selectedProject, setSelectedProject] = useState(null);

      useEffect(() => {
        const handleHash = () => {
          const hash = window.location.hash.slice(1) || '/';
          setCurrentRoute(hash);

          if (hash.startsWith('/portfolio/')) {
            const id = hash.replace('/portfolio/', '');
            const proj = PROJECTS_DATA.find(p => p.id === id);
            setSelectedProject(proj || null);
          } else {
            setSelectedProject(null);
          }
        };
        window.addEventListener('hashchange', handleHash);
        handleHash(); // init
        return () => window.removeEventListener('hashchange', handleHash);
      }, []);

      const t = I18N[lang];
      const isDark = theme === 'dark';
      const toggleDark = () => handleThemeChange(isDark ? 'warm' : 'dark');

      const handleSetLang = (l) => {
        setLang(l);
        localStorage.setItem('portfolio-lang', l);
      };

      useEffect(() => {
        document.body.className = theme === 'warm' ? '' : `theme-${theme}`;
      }, [theme]);

      useEffect(() => {
        if (currentRoute !== '/') return;
        const ids = ['about-section', 'projects-section', 'skills-section', 'blog-section', 'contact-section'];
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) setActiveSection(e.target.id); });
        }, { threshold: 0.4 });
        setTimeout(() => {
          ids.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
        }, 100);
        return () => obs.disconnect();
      }, [currentRoute]);

      useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      const handleThemeChange = (th) => {
        setTheme(th);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: th } }, '*');
      };

      const scrollTo = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 40, behavior: 'smooth' });
      };

      const navIds = ['about-section', 'projects-section', 'skills-section', 'blog-section', 'contact-section'];

      return (
        <LangContext.Provider value={lang}>
          <div className="layout">
            <MobileHeader menuOpen={menuOpen} setMenuOpen={setMenuOpen} lang={lang} setLang={handleSetLang} isDark={isDark} toggleDark={toggleDark} />
            <MobileDrawer open={menuOpen} setOpen={setMenuOpen} activeSection={activeSection} scrollTo={scrollTo} t={t} currentRoute={currentRoute} />
            <nav className="sidebar">
              <div>
                <div className="sidebar-name">KIM Hyogyeom</div>
                <div className="sidebar-role">{t.role}</div>
              </div>
              <div className="nav">
                {currentRoute === '/' ? navIds.map((id, i) => (
                  <button key={id}
                    className={`nav-item${activeSection === id ? ' active' : ''}`}
                    onClick={() => scrollTo(id)}
                  >{t.navItems[i]}</button>
                )) : (
                  <button className="nav-item active" onClick={() => window.location.hash = '/'}>
                    ← Home
                  </button>
                )}
              </div>
              <div style={{ marginTop: 'auto', paddingTop: 24 }}>
                <div className="sidebar-bottom-row">
                  <LangSwitcher lang={lang} setLang={handleSetLang} />
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span className="dark-toggle-label">{isDark ? '🌙' : '☀️'}</span>
                    <button className={`dark-toggle${isDark ? ' on' : ''}`} onClick={toggleDark} aria-label="다크모드 토글" />
                  </div>
                </div>
                <div className="sidebar-footer">
                  {t.footer.split('\n').map((line, i) => <div key={i}>{line}</div>)}
                </div>
              </div>
            </nav>

            <main className="main">
              {currentRoute === '/' ? (
                <>
                  <HeroSection />
                  <ProjectsSection />
                  <SkillsSection />
                  <BlogSection />
                  <ContactSection endpoint={endpoint} />
                </>
              ) : currentRoute.startsWith('/portfolio/') ? (
                <PortfolioView selectedProject={selectedProject} />
              ) : (
                <div style={{ padding: '100px 0', textAlign: 'center' }}>
                  Page not found. <a href="#/" style={{ color: 'var(--accent)' }}>Go back</a>
                </div>
              )}
            </main>

            <TweaksPanel open={tweaksOpen} theme={theme} setTheme={handleThemeChange} endpoint={endpoint} setEndpoint={setEndpoint} t={t} />
          </div>
        </LangContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
